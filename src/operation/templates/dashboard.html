<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIoT Operation Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 12px;
      cursor: pointer; transition: all .2s;
    }
    .btn:hover { background: var(--border); }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,.15); }
    #clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Main grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    /* ── Camera feeds ── */
    .cameras-section h2,
    .map-section h2,
    .timeline-section h2 {
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 10px;
    }
    .cameras {
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .camera-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; flex: 1 1 280px; max-width: 420px;
    }
    .camera-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .camera-card-header span { font-size: 13px; font-weight: 600; }
    .cam-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 999px;
      background: rgba(59,130,246,.2); color: var(--blue); font-weight: 600;
    }
    .camera-card img {
      width: 100%; border-radius: 6px; background: #000;
      display: block; aspect-ratio: 4/3; object-fit: contain;
    }

    /* ── Right column ── */
    .right-col { display: flex; flex-direction: column; gap: 16px; }

    /* ── Floor map SVG container ── */
    .map-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    #floor-svg { width: 100%; height: auto; display: block; }

    /* room cells inside SVG */
    .room-rect {
      transition: fill .35s, stroke .35s, filter .35s;
      cursor: default;
    }
    .room-label { font-family: 'Segoe UI', Arial, sans-serif; pointer-events: none; }

    /* ── Room detail cards (below map) ── */
    .rooms-detail { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .room-detail-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color .3s;
    }
    .room-detail-card.active { border-color: var(--green); }
    .room-detail-card.inferred { border-color: var(--yellow); }
    .room-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--muted);
    }
    .room-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .room-dot.inferred { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .room-info { flex: 1; min-width: 0; }
    .room-info-name { font-size: 12px; font-weight: 600; }
    .room-info-sub { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-state-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 999px;
      font-weight: 700; flex-shrink: 0;
    }
    .badge-tracking { background: rgba(34,197,94,.2); color: var(--green); }
    .badge-fallback { background: rgba(249,115,22,.2); color: var(--orange); }
    .badge-lost     { background: rgba(239,68,68,.2);  color: var(--red); }
    .badge-inferred { background: rgba(234,179,8,.2);  color: var(--yellow); }
    .badge-search   { background: rgba(59,130,246,.2); color: var(--blue); }
    .badge-empty    { background: rgba(100,116,139,.15); color: var(--muted); }

    /* ── Timeline ── */
    .timeline-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; flex: 1;
    }
    .timeline-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .timeline-header h2 { margin-bottom: 0; }
    #timeline-list {
      max-height: 320px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
    }
    #timeline-list::-webkit-scrollbar { width: 4px; }
    #timeline-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tl-item {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 5px 8px; border-radius: 6px; background: var(--surface2);
      font-size: 11px; border-left: 3px solid transparent;
    }
    .tl-time { color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 52px; }
    .tl-event { font-weight: 600; flex-shrink: 0; width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-detail { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-ACQUIRED  { border-color: var(--green); }
    .tl-LOST      { border-color: var(--red); }
    .tl-REACQUIRED{ border-color: var(--blue); }
    .tl-IGNORED   { border-color: var(--muted); }
    .tl-INFERRED  { border-color: var(--yellow); }
    .tl-other     { border-color: var(--border); }

    /* ── Status bar ── */
    #status-bar {
      margin-top: 12px; font-size: 11px; color: var(--muted);
      display: flex; gap: 16px; flex-wrap: wrap;
    }

    /* ── Pulse animations ── */
    @keyframes pulse-ring {
      0%   { opacity: .7; r: 34px; }
      100% { opacity: 0;  r: 46px; }
    }
    .pulse-active { animation: pulse-ring 1.2s ease-out infinite; }
    @keyframes pulse-ring-slow {
      0%   { opacity: .5; r: 34px; }
      100% { opacity: 0;  r: 44px; }
    }
    .pulse-inferred { animation: pulse-ring-slow 2s ease-out infinite; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏠 AIoT Multi-Camera Dashboard</h1>
    <div class="subtitle">Theo dõi thời gian thực &middot; hệ thống nhận diện khuôn mặt đa phòng</div>
  </div>
  <div class="header-right">
    <span id="clock">--:--:--</span>
    <button class="btn btn-danger" onclick="resetInference()">⟳ Reset suy luận</button>
  </div>
</div>

<div class="main-grid">

  <!-- Left: cameras + timeline -->
  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="cameras-section">
      <h2>📷 Camera feeds</h2>
      <div class="cameras">
        {% for room in rooms %}
        <div class="camera-card">
          <div class="camera-card-header">
            <span>{{ room.room_name }}</span>
            <span class="cam-badge">CAM {{ loop.index }}</span>
          </div>
          <img src="/video_feed/{{ room.id }}" alt="{{ room.room_name }} feed">
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-header">
        <h2>📋 Lịch sử sự kiện</h2>
        <button class="btn" onclick="clearTimeline()">Xóa</button>
      </div>
      <div id="timeline-list">
        <div class="tl-item tl-other">
          <span class="tl-time">--:--:--</span>
          <span class="tl-event">SYSTEM</span>
          <span class="tl-detail">Đang kết nối...</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Right: floor map + room cards -->
  <div class="right-col">

    <div class="map-section">
      <h2>🗺 Sơ đồ tầng</h2>

      <!--
        Cross layout (90×90 cells, 10px gap, 20px margin):
        Grid positions (col,row) 0-indexed:
          p3 → (1,0)
          p5 → (0,1)   p2 → (1,1)   p1 → (2,1)
          p4 → (1,2)

        Cell size = 90, gap = 10, margin = 14
        Total width  = 14 + 3*90 + 2*10 + 14 = 318
        Total height = 14 + 3*90 + 2*10 + 14 = 318
      -->
      <svg id="floor-svg" viewBox="0 0 318 318" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-yellow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- walls / background -->
        <rect x="0" y="0" width="318" height="318" fill="#0f1117" rx="8"/>

        <!-- corridor lines connecting rooms -->
        <!-- horizontal: p5-p2-p1 -->
        <line x1="104" y1="159" x2="214" y2="159" stroke="#2e3250" stroke-width="2"/>
        <!-- vertical: p3-p2-p4 -->
        <line x1="159" y1="104" x2="159" y2="214" stroke="#2e3250" stroke-width="2"/>

        <!-- ── Room: p3 (top center) ── -->
        <g id="svg-room-p3">
          <circle cx="159" cy="59" r="0" class="pulse-ring" fill="none" stroke="#eab308" stroke-width="2" opacity="0"/>
          <rect id="rect-p3" x="114" y="14" width="90" height="90" rx="10"
                fill="#1a1d27" stroke="#2e3250" stroke-width="1.5" class="room-rect"/>
          <text x="159" y="53" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" class="room-label">Phòng 3</text>
          <text id="sub-p3" x="159" y="70" text-anchor="middle" fill="#64748b" font-size="10" class="room-label">--</text>
          <text id="id-p3" x="159" y="87" text-anchor="middle" fill="#64748b" font-size="9" class="room-label"></text>
        </g>

        <!-- ── Room: p5 (left) ── -->
        <g id="svg-room-p5">
          <circle cx="59" cy="159" r="0" class="pulse-ring" fill="none" stroke="#eab308" stroke-width="2" opacity="0"/>
          <rect id="rect-p5" x="14" y="114" width="90" height="90" rx="10"
                fill="#1a1d27" stroke="#2e3250" stroke-width="1.5" class="room-rect"/>
          <text x="59" y="153" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" class="room-label">Phòng 5</text>
          <text id="sub-p5" x="59" y="170" text-anchor="middle" fill="#64748b" font-size="10" class="room-label">--</text>
          <text id="id-p5" x="59" y="187" text-anchor="middle" fill="#64748b" font-size="9" class="room-label"></text>
        </g>

        <!-- ── Room: p2 (center) ── -->
        <g id="svg-room-p2">
          <circle cx="159" cy="159" r="0" class="pulse-ring" fill="none" stroke="#22c55e" stroke-width="2" opacity="0"/>
          <rect id="rect-p2" x="114" y="114" width="90" height="90" rx="10"
                fill="#1a1d27" stroke="#2e3250" stroke-width="1.5" class="room-rect"/>
          <text x="159" y="153" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" class="room-label">Phòng 2</text>
          <text id="sub-p2" x="159" y="170" text-anchor="middle" fill="#64748b" font-size="10" class="room-label">--</text>
          <text id="id-p2" x="159" y="187" text-anchor="middle" fill="#64748b" font-size="9" class="room-label"></text>
          <!-- cam icon -->
          <text x="194" y="126" font-size="11" class="room-label">📷</text>
        </g>

        <!-- ── Room: p1 (right) ── -->
        <g id="svg-room-p1">
          <circle cx="259" cy="159" r="0" class="pulse-ring" fill="none" stroke="#22c55e" stroke-width="2" opacity="0"/>
          <rect id="rect-p1" x="214" y="114" width="90" height="90" rx="10"
                fill="#1a1d27" stroke="#2e3250" stroke-width="1.5" class="room-rect"/>
          <text x="259" y="153" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" class="room-label">Phòng 1</text>
          <text id="sub-p1" x="259" y="170" text-anchor="middle" fill="#64748b" font-size="10" class="room-label">--</text>
          <text id="id-p1" x="259" y="187" text-anchor="middle" fill="#64748b" font-size="9" class="room-label"></text>
          <!-- cam icon -->
          <text x="294" y="126" font-size="11" class="room-label">📷</text>
        </g>

        <!-- ── Room: p4 (bottom center) ── -->
        <g id="svg-room-p4">
          <circle cx="159" cy="259" r="0" class="pulse-ring" fill="none" stroke="#eab308" stroke-width="2" opacity="0"/>
          <rect id="rect-p4" x="114" y="214" width="90" height="90" rx="10"
                fill="#1a1d27" stroke="#2e3250" stroke-width="1.5" class="room-rect"/>
          <text x="159" y="253" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" class="room-label">Phòng 4</text>
          <text id="sub-p4" x="159" y="270" text-anchor="middle" fill="#64748b" font-size="10" class="room-label">--</text>
          <text id="id-p4" x="159" y="287" text-anchor="middle" fill="#64748b" font-size="9" class="room-label"></text>
        </g>

        <!-- legend -->
        <rect x="14" y="296" width="10" height="10" rx="2" fill="#22c55e" opacity=".8"/>
        <text x="28" y="305" fill="#64748b" font-size="9" class="room-label">Xác nhận</text>
        <rect x="80" y="296" width="10" height="10" rx="2" fill="#eab308" opacity=".8"/>
        <text x="94" y="305" fill="#64748b" font-size="9" class="room-label">Suy luận</text>
        <rect x="146" y="296" width="10" height="10" rx="2" fill="#3b82f6" opacity=".5"/>
        <text x="160" y="305" fill="#64748b" font-size="9" class="room-label">Có cam</text>
        <text x="204" y="305" fill="#64748b" font-size="9" class="room-label">📷 = camera</text>
      </svg>

      <!-- Room detail cards -->
      <div class="rooms-detail" id="rooms-detail"></div>
    </div>

  </div>
</div>

<div id="status-bar">
  <span id="status-update">Đang kết nối...</span>
  <span id="status-inference"></span>
</div>

<script>
// ── Config (fetched once from server) ──────────────────────────────────────
let CFG = { inferred_presence_timeout_sec: 60, floor_plan: [], target_fps: 30 };
let seenEventTimes = new Set();
let timelineItems = [];
const MAX_TIMELINE = 80;

async function fetchConfig() {
  try {
    const r = await fetch('/api/config');
    CFG = await r.json();
  } catch(e) {}
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('vi-VN');
}
setInterval(updateClock, 1000);
updateClock();

// ── Floor map update ───────────────────────────────────────────────────────
const ROOM_IDS = ['p1','p2','p3','p4','p5'];

function stateColor(room) {
  if (room.has_target) {
    if (room.state === 'TRACKING_FACE')   return { fill:'#14532d', stroke:'#22c55e', glow:'glow-green', pulse:'green' };
    if (room.state === 'FALLBACK_PERSON') return { fill:'#431407', stroke:'#f97316', glow:'glow-green', pulse:'green' };
    return { fill:'#1c2d1a', stroke:'#22c55e', glow:'glow-green', pulse:'green' };
  }
  if (room.inferred) return { fill:'#2d2500', stroke:'#eab308', glow:'glow-yellow', pulse:'yellow' };
  if (room.state === 'LOST') return { fill:'#2d1515', stroke:'#ef4444', glow:null, pulse:null };
  return { fill:'#1a1d27', stroke:'#2e3250', glow:null, pulse:null };
}

function badgeClass(state, inferred) {
  if (inferred) return 'badge-inferred';
  if (state === 'TRACKING_FACE') return 'badge-tracking';
  if (state === 'FALLBACK_PERSON') return 'badge-fallback';
  if (state === 'LOST') return 'badge-lost';
  if (state === 'SEARCHING') return 'badge-search';
  return 'badge-empty';
}

function badgeLabel(state, inferred, hasCam) {
  if (inferred) return '⚠ Suy luận';
  if (state === 'TRACKING_FACE')   return '✔ Face';
  if (state === 'FALLBACK_PERSON') return '~ Person';
  if (state === 'LOST')            return '✗ Lost';
  if (state === 'SEARCHING')       return '⌕ Search';
  if (state === 'EMPTY')           return hasCam ? '⌕ Trống' : '— Không cam';
  return state || '--';
}

function updateFloorMap(rooms) {
  rooms.forEach(room => {
    const col = stateColor(room);
    const rect = document.getElementById('rect-' + room.id);
    const sub  = document.getElementById('sub-' + room.id);
    const idEl = document.getElementById('id-'  + room.id);
    if (!rect) return;

    rect.setAttribute('fill', col.fill);
    rect.setAttribute('stroke', col.stroke);
    rect.setAttribute('filter', col.glow ? `url(#${col.glow})` : '');

    // pulse ring
    const circle = rect.previousElementSibling;
    if (circle && circle.tagName === 'circle') {
      if (col.pulse === 'green') {
        circle.setAttribute('stroke', '#22c55e');
        circle.setAttribute('r', '45');
        circle.setAttribute('opacity', '0');
        circle.style.animation = 'pulse-ring 1.2s ease-out infinite';
      } else if (col.pulse === 'yellow') {
        circle.setAttribute('stroke', '#eab308');
        circle.setAttribute('r', '45');
        circle.setAttribute('opacity', '0');
        circle.style.animation = 'pulse-ring-slow 2s ease-out infinite';
      } else {
        circle.style.animation = 'none';
        circle.setAttribute('r', '0');
        circle.setAttribute('opacity', '0');
      }
    }

    // sub text: state label
    if (sub) {
      if (room.has_target) {
        sub.textContent = room.state === 'TRACKING_FACE' ? '✔ Face tracking' :
                          room.state === 'FALLBACK_PERSON' ? '~ Person tracking' : room.state;
        sub.setAttribute('fill', room.state === 'TRACKING_FACE' ? '#22c55e' : '#f97316');
      } else if (room.inferred) {
        const t = CFG.inferred_presence_timeout_sec;
        const elapsed = room.inferred_since || 0;
        const remain = t > 0 ? Math.max(0, t - elapsed) : '∞';
        sub.textContent = `⚠ Có thể ở đây (${remain}s)`;
        sub.setAttribute('fill', '#eab308');
      } else if (room.state === 'LOST') {
        sub.textContent = '✗ Mất dấu';
        sub.setAttribute('fill', '#ef4444');
      } else {
        sub.textContent = room.has_cam ? '⌕ Đang quét' : '—';
        sub.setAttribute('fill', '#64748b');
      }
    }

    // identity text
    if (idEl) {
      idEl.textContent = room.identity ? `👤 ${room.identity}` : '';
      idEl.setAttribute('fill', '#a855f7');
    }
  });
}

// ── Room detail cards ──────────────────────────────────────────────────────
function updateDetailCards(rooms) {
  const container = document.getElementById('rooms-detail');
  // Build or update cards
  rooms.forEach(room => {
    let card = document.getElementById('card-' + room.id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + room.id;
      card.className = 'room-detail-card';
      card.innerHTML = `
        <div class="room-dot" id="dot-${room.id}"></div>
        <div class="room-info">
          <div class="room-info-name">${room.room_name}${room.has_cam ? ' 📷' : ''}</div>
          <div class="room-info-sub" id="card-sub-${room.id}">--</div>
        </div>
        <span class="room-state-badge" id="card-badge-${room.id}">--</span>
      `;
      container.appendChild(card);
    }

    const dot   = document.getElementById('dot-' + room.id);
    const sub   = document.getElementById('card-sub-' + room.id);
    const badge = document.getElementById('card-badge-' + room.id);

    card.className = 'room-detail-card' + (room.has_target ? ' active' : room.inferred ? ' inferred' : '');
    dot.className  = 'room-dot' + (room.has_target ? ' active' : room.inferred ? ' inferred' : '');

    let subText = '';
    if (room.identity) subText += `👤 ${room.identity}  `;
    if (room.latency_ms !== null && room.latency_ms !== undefined)
      subText += `⏱ ${room.latency_ms}ms`;
    if (room.inferred && room.inferred_since !== null) {
      const t = CFG.inferred_presence_timeout_sec;
      const remain = t > 0 ? Math.max(0, t - room.inferred_since) + 's' : '∞';
      subText = `Suy luận từ lân cận  (tự xóa: ${remain})`;
    }
    sub.textContent = subText || (room.has_cam ? 'Không phát hiện' : 'Không có camera');

    badge.textContent = badgeLabel(room.state, room.inferred, room.has_cam);
    badge.className   = 'room-state-badge ' + badgeClass(room.state, room.inferred);
  });
}

// ── Timeline ───────────────────────────────────────────────────────────────
function tlClass(event) {
  if (event.includes('ACQUIRED'))   return 'tl-ACQUIRED';
  if (event.includes('LOST'))       return 'tl-LOST';
  if (event.includes('REACQUIRED')) return 'tl-REACQUIRED';
  if (event.includes('IGNORED'))    return 'tl-IGNORED';
  if (event.includes('INFERRED'))   return 'tl-INFERRED';
  return 'tl-other';
}

async function pollTimeline() {
  try {
    const r = await fetch('/api/events?n=60');
    const data = await r.json();
    const list = document.getElementById('timeline-list');
    let changed = false;

    data.events.forEach(ev => {
      const key = ev.time + '|' + ev.event + '|' + ev.details;
      if (seenEventTimes.has(key)) return;
      seenEventTimes.add(key);
      timelineItems.unshift(ev);  // newest first
      changed = true;
    });

    if (changed) {
      if (timelineItems.length > MAX_TIMELINE) timelineItems = timelineItems.slice(0, MAX_TIMELINE);
      list.innerHTML = timelineItems.map(ev => `
        <div class="tl-item ${tlClass(ev.event)}">
          <span class="tl-time">${ev.time}</span>
          <span class="tl-event">${ev.event}</span>
          <span class="tl-detail">${ev.details}</span>
        </div>
      `).join('');
    }
  } catch(e) {}
}

function clearTimeline() {
  timelineItems = [];
  seenEventTimes.clear();
  document.getElementById('timeline-list').innerHTML =
    '<div class="tl-item tl-other"><span class="tl-time">--</span><span class="tl-event">CLEARED</span><span class="tl-detail"></span></div>';
}

// ── Reset inference ────────────────────────────────────────────────────────
async function resetInference() {
  try {
    await fetch('/api/reset_inference', { method: 'POST' });
    document.getElementById('status-inference').textContent = 'Đã reset suy luận';
    setTimeout(() => document.getElementById('status-inference').textContent = '', 3000);
  } catch(e) {}
}

// ── Main poll loop ─────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch('/api/room_status');
    const data = await r.json();

    updateFloorMap(data.rooms);
    updateDetailCards(data.rooms);

    const active = data.rooms.filter(r => r.has_target).map(r => r.room_name);
    const inferred = data.rooms.filter(r => r.inferred).map(r => r.room_name);
    document.getElementById('status-update').textContent =
      'Cập nhật: ' + new Date().toLocaleTimeString('vi-VN') +
      (active.length ? '  |  🔴 Phát hiện: ' + active.join(', ') : '') +
      (inferred.length ? '  |  🟡 Suy luận: ' + inferred.join(', ') : '');
  } catch(e) {
    document.getElementById('status-update').textContent = 'Mất kết nối: ' + e.message;
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await fetchConfig();
  await pollStatus();
  await pollTimeline();
  setInterval(pollStatus, 500);
  setInterval(pollTimeline, 2000);
})();
</script>
